# Leads Alquiler — Docker Compose para Dokploy / VPS
#
# Variables OBLIGATORIAS en el panel de Dokploy (Environment Variables):
#   DOMAIN              → dominio público, ej: leads.tudominio.com
#   DATABASE_URL        → postgresql://user:pass@host:port/leads_qualifier
#   JWT_SECRET          → cadena larga y aleatoria (mín. 32 caracteres)
#   SUPER_ADMIN_USERNAME
#   SUPER_ADMIN_PASSWORD o SUPER_ADMIN_PASSWORD_HASH
#   OPENAI_API_KEY
#   FRONTEND_URL        → https://<DOMAIN>  (mismo dominio, para CORS)
#   APP_NAME
#
# Variables opcionales:
#   CHATWOOT_URL, CHATWOOT_TOKEN
#   N8N_ALERT_WEBHOOK_URL, WEBHOOK_FORMULARIO_ENVIADO
#   SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS, SMTP_FROM
#
# NOTA: container_name se omite; Dokploy usa COMPOSE_PROJECT_NAME como prefijo.
# NOTA: si el postgres está en red Docker interna (no IP directa), añadir la red
#       externa aquí y conectar el servicio api a ella.

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false   # en Dokploy las vars vienen del panel, no de .env
    environment:
      NODE_ENV: production
      PORT: 3001
    networks:
      leads-internal:
        aliases:
          - leads-api

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Vacío: nginx hace de proxy, no necesita URL absoluta de la API
        VITE_API_PUBLIC_URL: ${VITE_API_PUBLIC_URL:-}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - leads-internal   # proxy nginx → api
      - dokploy-network  # Traefik
    labels:
      - "traefik.enable=true"

      # ── Router HTTPS ──────────────────────────────────────────────────────
      # COMPOSE_PROJECT_NAME: Dokploy lo rellena automáticamente (único por app)
      # DOMAIN: debes configurarlo en las variables de entorno de Dokploy
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-leads.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-leads.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-leads.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-leads.tls.certresolver=letsencrypt"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-leads.loadbalancer.server.port=80"

      # ── Router HTTP → HTTPS (redirección permanente) ──────────────────────
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-leads-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-leads-http.entrypoints=web"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-leads-http.middlewares=${COMPOSE_PROJECT_NAME}-https-redirect"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-https-redirect.redirectscheme.permanent=true"

networks:
  leads-internal:
    driver: bridge

  # Red de Traefik gestionada por Dokploy. No modificar el nombre.
  dokploy-network:
    external: true
