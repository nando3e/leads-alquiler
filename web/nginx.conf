server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 ipv6=off;

    # Gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # SPA: cualquier ruta no encontrada → index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API al alias interno del backend.
    # Usamos variable + resolver de Docker para evitar IPs obsoletas tras recrear contenedores.
    location /api/ {
        set $api_upstream http://leads-api:3001;
        proxy_pass $api_upstream/api/;
        proxy_http_version 1.1;

        # Headers estándar de proxy
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Necesario para conexiones keep-alive
        proxy_set_header Connection "";

        # Timeouts: la API puede tardar (LLM, migraciones) — ajustar si es necesario
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # No guardar en caché las respuestas de la API
        add_header Cache-Control "no-store" always;
    }

    # Caché para assets estáticos con hash en el nombre (Vite los genera así)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
